AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Database stack - RDS PostgreSQL instance, RDS Proxy for connection pooling,
  and a Secrets Manager secret for credentials. ECS tasks connect through the
  proxy endpoint; the RDS instance is not directly reachable from ECS subnets.

Parameters:
  Environment:
    Type: String

  DBSubnet1Id:
    Type: AWS::EC2::Subnet::Id

  DBSubnet2Id:
    Type: AWS::EC2::Subnet::Id

  RDSProxySecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

  RDSSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

  DBName:
    Type: String
    Default: tododb

  DBUsername:
    Type: String
    Default: dbadmin

  DBInstanceClass:
    Type: String
    Default: db.t3.micro

Resources:

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private DB subnets for todo-app RDS and RDS Proxy
      SubnetIds:
        - !Ref DBSubnet1Id
        - !Ref DBSubnet2Id
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-todo-app-db-subnet-group'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${Environment}/todo-app/db-credentials'
      Description: RDS PostgreSQL credentials for todo-app
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${DBUsername}", "dbname": "${DBName}"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceClass: !Ref DBInstanceClass
      Engine: postgres
      EngineVersion: '16.4'
      DBName: !Ref DBName
      MasterUsername: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroupId
      AllocatedStorage: '20'
      StorageType: gp2
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      MultiAZ: false
      PubliclyAccessible: false
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-todo-app-db'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  SecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref DBSecret
      TargetId: !Ref DBInstance
      TargetType: AWS::RDS::DBInstance

  # ── RDS Proxy ─────────────────────────────────────────────────────────────────

  RDSProxyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-todo-app-rds-proxy'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Ref DBSecret
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  DBProxy:
    Type: AWS::RDS::DBProxy
    Properties:
      DBProxyName: !Sub '${Environment}-todo-app-proxy'
      EngineFamily: POSTGRESQL
      RoleArn: !GetAtt RDSProxyRole.Arn
      Auth:
        - AuthScheme: SECRETS
          SecretArn: !Ref DBSecret
          IAMAuth: DISABLED
      VpcSubnetIds:
        - !Ref DBSubnet1Id
        - !Ref DBSubnet2Id
      VpcSecurityGroupIds:
        - !Ref RDSProxySecurityGroupId
      RequireTLS: false
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-todo-app-proxy'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  DBProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Properties:
      DBProxyName: !Ref DBProxy
      TargetGroupName: default
      DBInstanceIdentifiers:
        - !Ref DBInstance
      ConnectionPoolConfigurationInfo:
        MaxConnectionsPercent: 100
        MaxIdleConnectionsPercent: 50
        ConnectionBorrowTimeout: 120

Outputs:

  ProxyEndpoint:
    Description: RDS Proxy endpoint - use this for application connections
    Value: !GetAtt DBProxy.Endpoint

  DBEndpoint:
    Description: RDS instance endpoint - direct access for admin only
    Value: !GetAtt DBInstance.Endpoint.Address

  DBPort:
    Value: !GetAtt DBInstance.Endpoint.Port

  DBName:
    Value: !Ref DBName

  DBSecretArn:
    Description: ARN of the Secrets Manager secret containing DB credentials
    Value: !Ref DBSecret
