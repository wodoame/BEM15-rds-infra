AWSTemplateFormatVersion: '2010-09-09'
Description: ECR repository for the todo-app application image

Parameters:
  Environment:
    Type: String

Resources:

  Repository:
    Type: AWS::ECR::Repository
    Properties:
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": {"type": "expire"}
              }
            ]
          }
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-todo-app'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

Outputs:

  RepositoryUri:
    Value: !GetAtt Repository.RepositoryUri

  RepositoryArn:
    Value: !GetAtt Repository.Arn

  RepositoryName:
    Value: !Ref Repository
