AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Cache stack - ElastiCache Redis cluster in dedicated private subnets.
  Used by ECS tasks to accelerate read-heavy todo list queries.

Parameters:
  Environment:
    Type: String

  CacheSubnet1Id:
    Type: AWS::EC2::Subnet::Id

  CacheSubnet2Id:
    Type: AWS::EC2::Subnet::Id

  ElastiCacheSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

  CacheNodeType:
    Type: String
    Default: cache.t3.micro

Resources:

  # Subnet pool ElastiCache may place nodes in — the two private cache-tier subnets (10.0.31/32.0/24).
  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Private cache subnets for todo-app Redis
      SubnetIds:
        - !Ref CacheSubnet1Id
        - !Ref CacheSubnet2Id
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-todo-app-cache-subnet-group'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # Redis replication group: one primary + one replica, placed in separate AZs via the
  # two-AZ subnet group. Multi-AZ with automatic failover gives HA, and a replica in each
  # AZ lets read-heavy traffic be served from a same-AZ node (the app routes reads via
  # Lettuce ReadFrom.LOWEST_LATENCY). Reachable only from the ECS tier on 6379.
  RedisReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      # Distinct from the legacy single-node cluster id (${Environment}-todo-redis):
      # on the cluster->replication-group switch CloudFormation creates this before
      # deleting the old node, and ElastiCache rejects a duplicate identifier.
      ReplicationGroupId: !Sub '${Environment}-todo-redis-rg'
      ReplicationGroupDescription: Redis cache for todo-app (primary + cross-AZ replica)
      Engine: redis
      CacheNodeType: !Ref CacheNodeType
      NumCacheClusters: 2
      AutomaticFailoverEnabled: true
      MultiAZEnabled: true
      Port: 6379
      CacheSubnetGroupName: !Ref CacheSubnetGroup
      SecurityGroupIds:
        - !Ref ElastiCacheSecurityGroupId
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-todo-redis'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

Outputs:

  RedisEndpoint:
    Description: Redis primary endpoint address (writes; reads routed to replicas by the client)
    Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address

  RedisPort:
    Description: Redis primary endpoint port
    Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Port
